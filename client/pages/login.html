<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
    <div class="page-shell page-auth page-light">
        <div class="auth-card glass-panel shadow-lg p-4">
            <div class="text-center mb-4">
                <h1>Welcome back</h1>
                <p>Sign in to access your dashboard and task management tools.</p>
            </div>
            <form id="loginForm" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Email address</label>
                    <input type="email" id="email" class="form-control" placeholder="jane@example.com" required />
                </div>
                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required />
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </div>
            </form>
            <p class="text-center text-muted mt-3">New here? <a href="register.html">Create account</a></p>
        </div>
        <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    </div>
    <script src="../js/auth.js"></script>
</body>

</html>
