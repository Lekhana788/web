<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | TaskFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
    <div class="page-shell page-dashboard page-light">
        <header class="dashboard-header glass-panel shadow-sm p-3 mb-4">
            <div
                class="container d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3">
                <div>
                    <h1>Welcome back, <span id="userName">User</span></h1>
                    <p class="text-muted">Manage your tasks, stay focused, and customize your workspace.</p>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button id="toggleTheme" class="btn btn-outline-secondary"><i class="fa-solid fa-moon"></i></button>
                    <button id="logoutBtn" class="btn btn-danger">Logout</button>
                </div>
            </div>
        </header>

        <main class="container">
            <section class="dashboard-grid row gy-4">
                <div class="col-lg-4">
                    <div class="glass-panel p-4 shadow-sm">
                        <h2>New Task</h2>
                        <form id="taskForm" class="row g-3">
                            <div class="col-12">
                                <label class="form-label">Title</label>
                                <input type="text" id="taskTitle" class="form-control" placeholder="Design new landing"
                                    required />
                            </div>
                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea id="taskDescription" class="form-control" rows="3"
                                    placeholder="Add task details"></textarea>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Status</label>
                                <select id="taskStatus" class="form-select">
                                    <option value="pending">Pending</option>
                                    <option value="in-progress">In progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Priority</label>
                                <select id="taskPriority" class="form-select">
                                    <option value="low">Low</option>
                                    <option value="medium" selected>Medium</option>
                                    <option value="high">High</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Due date</label>
                                <input type="date" id="taskDueDate" class="form-control" />
                            </div>
                            <div class="col-12 d-grid">
                                <button type="submit" class="btn btn-primary">Create Task</button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="glass-panel p-4 shadow-sm">
                        <div
                            class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center gap-3 mb-4">
                            <div class="search-field flex-grow-1">
                                <input id="searchInput" type="search" class="form-control"
                                    placeholder="Search tasks..." />
                            </div>
                            <div class="d-flex gap-2 flex-wrap">
                                <select id="filterStatus" class="form-select">
                                    <option value="">All statuses</option>
                                    <option value="pending">Pending</option>
                                    <option value="in-progress">In progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                                <select id="sortBy" class="form-select">
                                    <option value="createdAt">Newest</option>
                                    <option value="title">Title</option>
                                    <option value="status">Status</option>
                                </select>
                            </div>
                        </div>
                        <div id="taskList" class="task-list"></div>
                        <nav class="mt-4">
                            <ul id="pagination" class="pagination justify-content-center"></ul>
                        </nav>
                    </div>
                </div>
            </section>
        </main>
        <div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    </div>
    <script src="../js/dashboard.js"></script>
</body>

</html>
